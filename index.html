<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File & App Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --auxiliary: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --hover: #e94560;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 4px;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Sans SC", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(15, 52, 96, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(22, 33, 62, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(233, 69, 96, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 240px;
            padding: 10px 16px 10px 40px;
            background: var(--secondary);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .add-btn {
            position: relative;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .add-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--card-bg);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: var(--radius);
            padding: 8px;
            min-width: 160px;
            box-shadow: var(--shadow);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
        }

        .add-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
        }

        .dropdown-item:hover {
            background: rgba(233, 69, 96, 0.15);
        }

        .dropdown-item .icon {
            font-size: 16px;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            bottom: 40px;
            width: 240px;
            background: rgba(22, 33, 62, 0.5);
            border-right: 1px solid rgba(233, 69, 96, 0.1);
            padding: 24px 0;
            overflow-y: auto;
            transition: var(--transition);
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            padding: 0 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0;
            transition: var(--transition);
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(233, 69, 96, 0.1);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(233, 69, 96, 0.15);
        }

        .nav-item.active::before {
            opacity: 1;
        }

        .nav-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .nav-item .label {
            flex: 1;
            font-size: 14px;
        }

        .nav-item .count {
            font-size: 12px;
            padding: 2px 8px;
            background: rgba(233, 69, 96, 0.2);
            border-radius: 10px;
            color: var(--accent);
        }

        /* 主内容区 */
        .main {
            margin-left: 240px;
            margin-top: 60px;
            margin-bottom: 40px;
            padding: 24px;
            min-height: calc(100vh - 100px);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title .icon {
            font-size: 28px;
        }

        /* 文件网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--secondary), var(--auxiliary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .card-name {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .card-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(233, 69, 96, 0.15);
            border: none;
            border-radius: var(--radius-xs);
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: var(--accent);
        }

        .action-btn.delete:hover {
            background: #ff4757;
        }

        /* 应用卡片特殊样式 */
        .app-card .card-icon {
            background: linear-gradient(135deg, var(--auxiliary), #1e3a5f);
        }

        .card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 底部状态栏 */
        .statusbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: rgba(22, 33, 62, 0.95);
            border-top: 1px solid rgba(233, 69, 96, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .storage-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .storage-bar {
            width: 120px;
            height: 6px;
            background: var(--secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff6b6b);
            border-radius: 3px;
            transition: var(--transition);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: var(--transition);
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--accent);
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed rgba(233, 69, 96, 0.3);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.05);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .upload-text {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--secondary);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--auxiliary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-hint {
            font-size: 14px;
        }

        /* 文件预览 */
        .preview-modal .modal {
            max-width: 800px;
        }

        .preview-content {
            text-align: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: var(--radius-sm);
        }

        .preview-video {
            width: 100%;
            max-height: 400px;
            border-radius: var(--radius-sm);
        }

        /* 确认对话框 */
        .confirm-text {
            text-align: center;
            padding: 20px 0;
            font-size: 16px;
        }

        /* 隐藏的文件输入 */
        #fileInput {
            display: none;
        }

        /* 响应式 */
        @media (max-width: 1023px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }
        }

        @media (max-width: 767px) {
            .search-input {
                width: 160px;
            }

            .logo-text {
                display: none;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.4s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.3s; }
        .card:nth-child(7) { animation-delay: 0.35s; }
        .card:nth-child(8) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">📁</div>
            <span class="logo-text">File & App Hub</span>
        </div>
        <div class="navbar-right">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索文件或应用...">
            </div>
            <button class="add-btn" id="addBtn">
                <span>+</span>
                <span>添加</span>
            </button>
            <div class="add-dropdown" id="addDropdown">
                <div class="dropdown-item" id="uploadFileOption">
                    <span class="icon">📄</span>
                    <span>上传文件</span>
                </div>
                <div class="dropdown-item" id="addAppOption">
                    <span class="icon">🧩</span>
                    <span>添加小工具</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">文件管理</div>
            <div class="nav-item active" data-category="all">
                <span class="icon">📁</span>
                <span class="label">全部文件</span>
                <span class="count" id="countAll">0</span>
            </div>
            <div class="nav-item" data-category="document">
                <span class="icon">📄</span>
                <span class="label">文档</span>
                <span class="count" id="countDoc">0</span>
            </div>
            <div class="nav-item" data-category="image">
                <span class="icon">🖼️</span>
                <span class="label">图片</span>
                <span class="count" id="countImage">0</span>
            </div>
            <div class="nav-item" data-category="video">
                <span class="icon">🎬</span>
                <span class="label">视频</span>
                <span class="count" id="countVideo">0</span>
            </div>
            <div class="nav-item" data-category="tool">
                <span class="icon">🧩</span>
                <span class="label">小工具</span>
                <span class="count" id="countTool">0</span>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-title">应用管理</div>
            <div class="nav-item" data-category="app">
                <span class="icon">🚀</span>
                <span class="label">我的小工具</span>
                <span class="count" id="countApp">0</span>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main" id="mainContent">
        <!-- 内容动态生成 -->
    </main>

    <!-- 状态栏 -->
    <footer class="statusbar">
        <div class="storage-info">
            <span>存储使用:</span>
            <div class="storage-bar">
                <div class="storage-fill" id="storageFill" style="width: 0%"></div>
            </div>
            <span id="storageText">0 MB / 50 MB</span>
        </div>
        <div>
            <span id="itemCount">0 个项目</span>
        </div>
    </footer>

    <!-- 上传文件模态框 -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <h3 class="modal-title">📄 上传文件</h3>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">☁️</div>
                <div class="upload-text">拖拽文件到此处，或点击选择</div>
                <div class="upload-hint">支持文档、图片、视频、小工具</div>
            </div>
            <input type="file" id="fileInput" multiple>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeModal('uploadModal')">取消</button>
                <button class="btn btn-primary" id="confirmUpload">确认上传</button>
            </div>
        </div>
    </div>

    <!-- 添加应用模态框 -->
    <div class="modal-overlay" id="appModal">
        <div class="modal">
            <h3 class="modal-title">🧩 添加小工具</h3>
            <div class="form-group">
                <label class="form-label">应用名称</label>
                <input type="text" class="form-input" id="appName" placeholder="输入应用名称">
            </div>
            <div class="form-group">
                <label class="form-label">应用描述</label>
                <textarea class="form-input" id="appDesc" placeholder="简单描述这个应用"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">图标链接 (可选)</label>
                <input type="text" class="form-input" id="appIcon" placeholder="https://example.com/icon.png">
            </div>
            <div class="form-group">
                <label class="form-label">启动链接</label>
                <input type="text" class="form-input" id="appUrl" placeholder="https://example.com/app">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeModal('appModal')">取消</button>
                <button class="btn btn-primary" id="confirmAddApp">添加应用</button>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div class="modal-overlay preview-modal" id="previewModal">
        <div class="modal">
            <h3 class="modal-title" id="previewTitle">预览</h3>
            <div class="preview-content" id="previewContent"></div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeModal('previewModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3 class="modal-title">⚠️ 确认删除</h3>
            <p class="confirm-text" id="deleteText">确定要删除这个项目吗？此操作无法撤销。</p>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeModal('deleteModal')">取消</button>
                <button class="btn btn-primary" style="background: #ff4757;" id="confirmDelete">删除</button>
            </div>
        </div>
    </div>

    <script>
        // 数据库和存储
        let db;
        let apps = [];
        let currentCategory = 'all';
        let currentSearch = '';
        let pendingDelete = null;

        // 初始化 IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('FileAppHub', 1);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;

                    if (!database.objectStoreNames.contains('files')) {
                        const fileStore = database.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
                        fileStore.createIndex('type', 'type', { unique: false });
                        fileStore.createIndex('name', 'name', { unique: false });
                    }
                };
            });
        }

        // 文件类型检测
        function getFileType(file) {
            const type = file.type;
            if (type.startsWith('image/')) return 'image';
            if (type.startsWith('video/')) return 'video';
            if (type.startsWith('application/pdf') ||
                type.startsWith('application/msword') ||
                type.startsWith('application/vnd.') ||
                type.startsWith('text/') ||
                type.includes('document')) return 'document';
            return 'tool';
        }

        // 文件图标
        function getFileIcon(type) {
            const icons = {
                document: '📄',
                image: '🖼️',
                video: '🎬',
                tool: '🧩'
            };
            return icons[type] || '📁';
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 格式化日期
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('zh-CN');
        }

        // 保存文件到 IndexedDB
        async function saveFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const transaction = db.transaction(['files'], 'readwrite');
                    const store = transaction.objectStore('files');

                    const fileData = {
                        name: file.name,
                        type: getFileType(file),
                        size: file.size,
                        data: reader.result,
                        mimeType: file.type,
                        uploadTime: Date.now()
                    };

                    const request = store.add(fileData);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                };
                reader.onerror = () => reject(reader.error);
                reader.readAsDataURL(file);
            });
        }

        // 获取所有文件
        async function getFiles() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['files'], 'readonly');
                const store = transaction.objectStore('files');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // 删除文件
        async function deleteFile(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['files'], 'readwrite');
                const store = transaction.objectStore('files');
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // 保存应用到 localStorage
        function saveApps() {
            localStorage.setItem('fileAppHub_apps', JSON.stringify(apps));
        }

        // 加载应用
        function loadApps() {
            const data = localStorage.getItem('fileAppHub_apps');
            if (data) {
                apps = JSON.parse(data);
            }
        }

        // 添加应用
        function addApp(name, desc, icon, url) {
            const app = {
                id: Date.now(),
                name,
                desc,
                icon: icon || '🧩',
                url,
                addTime: Date.now()
            };
            apps.push(app);
            saveApps();
        }

        // 删除应用
        function deleteApp(id) {
            apps = apps.filter(app => app.id !== id);
            saveApps();
        }

        // 更新计数
        async function updateCounts() {
            const files = await getFiles();
            const docCount = files.filter(f => f.type === 'document').length;
            const imageCount = files.filter(f => f.type === 'image').length;
            const videoCount = files.filter(f => f.type === 'video').length;
            const toolCount = files.filter(f => f.type === 'tool').length;

            document.getElementById('countAll').textContent = files.length;
            document.getElementById('countDoc').textContent = docCount;
            document.getElementById('countImage').textContent = imageCount;
            document.getElementById('countVideo').textContent = videoCount;
            document.getElementById('countTool').textContent = toolCount;
            document.getElementById('countApp').textContent = apps.length;

            // 更新存储使用
            const totalSize = files.reduce((sum, f) => sum + f.size, 0);
            const maxStorage = 50 * 1024 * 1024;
            const percent = Math.min((totalSize / maxStorage) * 100, 100);
            document.getElementById('storageFill').style.width = percent + '%';
            document.getElementById('storageText').textContent = `${formatSize(totalSize)} / 50 MB`;

            return { files, totalSize };
        }

        // 渲染文件卡片
        function renderFileCard(file) {
            return `
                <div class="card" data-id="${file.id}" data-type="file">
                    <div class="card-icon">${getFileIcon(file.type)}</div>
                    <div class="card-name" title="${file.name}">${file.name}</div>
                    <div class="card-info">
                        <span>${formatSize(file.size)}</span>
                        <span>${formatDate(file.uploadTime)}</span>
                    </div>
                    <div class="card-actions">
                        ${file.type === 'image' || file.type === 'video' ?
                            `<button class="action-btn" onclick="previewFile(${file.id})">👁️ 预览</button>` : ''}
                        <button class="action-btn" onclick="downloadFile(${file.id})">📥 下载</button>
                        <button class="action-btn delete" onclick="confirmDeleteFile(${file.id}, '${file.name}')">🗑️ 删除</button>
                    </div>
                </div>
            `;
        }

        // 渲染应用卡片
        function renderAppCard(app) {
            return `
                <div class="card app-card" data-id="${app.id}" data-type="app">
                    <div class="card-icon">${app.icon}</div>
                    <div class="card-name">${app.name}</div>
                    <div class="card-desc">${app.desc || '暂无描述'}</div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="launchApp('${app.url}')">🚀 启动</button>
                        <button class="action-btn delete" onclick="confirmDeleteApp(${app.id}, '${app.name}')">🗑️ 删除</button>
                    </div>
                </div>
            `;
        }

        // 渲染内容
        async function render() {
            const main = document.getElementById('mainContent');
            const { files, totalSize } = await updateCounts();

            // 过滤文件
            let filteredFiles = files;
            if (currentCategory !== 'all' && currentCategory !== 'app') {
                filteredFiles = files.filter(f => f.type === currentCategory);
            }

            // 搜索过滤
            if (currentSearch) {
                const search = currentSearch.toLowerCase();
                if (currentCategory === 'app') {
                    apps = apps.filter(app =>
                        app.name.toLowerCase().includes(search) ||
                        (app.desc && app.desc.toLowerCase().includes(search))
                    );
                } else {
                    filteredFiles = filteredFiles.filter(f =>
                        f.name.toLowerCase().includes(search)
                    );
                }
            }

            // 确定显示模式
            const showApps = currentCategory === 'all' || currentCategory === 'app';
            const showFiles = currentCategory !== 'app';

            // 页面标题
            const titles = {
                all: '📁 全部文件',
                document: '📄 文档',
                image: '🖼️ 图片',
                video: '🎬 视频',
                tool: '🧩 小工具',
                app: '🚀 我的小工具'
            };

            let html = `<h2 class="page-title">${titles[currentCategory] || '📁 文件管理'}</h2>`;

            // 显示文件
            if (showFiles && filteredFiles.length > 0) {
                html += '<div class="grid">';
                html += filteredFiles.map(renderFileCard).join('');
                html += '</div>';
            }

            // 显示应用
            if (showApps && apps.length > 0) {
                if (showFiles && filteredFiles.length > 0) {
                    html += '<h2 class="page-title" style="margin-top: 32px;">🚀 我的小工具</h2>';
                }
                html += '<div class="grid">';
                html += apps.map(renderAppCard).join('');
                html += '</div>';
            }

            // 空状态
            if ((!showFiles || filteredFiles.length === 0) && (!showApps || apps.length === 0)) {
                html += `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">暂无内容</div>
                        <div class="empty-hint">点击右上角的"添加"按钮上传文件或添加小工具</div>
                    </div>
                `;
            }

            // 更新项目计数
            const totalItems = (showFiles ? filteredFiles.length : 0) + (showApps ? apps.length : 0);
            document.getElementById('itemCount').textContent = `${totalItems} 个项目`;

            main.innerHTML = html;
        }

        // 预览文件
        async function previewFile(id) {
            const files = await getFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            const modal = document.getElementById('previewModal');
            const title = document.getElementById('previewTitle');
            const content = document.getElementById('previewContent');

            title.textContent = '👁️ ' + file.name;

            if (file.type === 'image') {
                content.innerHTML = `<img src="${file.data}" class="preview-image" alt="${file.name}">`;
            } else if (file.type === 'video') {
                content.innerHTML = `<video src="${file.data}" class="preview-video" controls></video>`;
            } else {
                content.innerHTML = `<p>此文件类型不支持预览</p>`;
            }

            modal.classList.add('show');
        }

        // 下载文件
        async function downloadFile(id) {
            const files = await getFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            const link = document.createElement('a');
            link.href = file.data;
            link.download = file.name;
            link.click();
        }

        // 启动应用
        function launchApp(url) {
            if (url) {
                window.open(url, '_blank');
            }
        }

        // 确认删除文件
        function confirmDeleteFile(id, name) {
            pendingDelete = { type: 'file', id, name };
            document.getElementById('deleteText').textContent = `确定要删除文件 "${name}" 吗？此操作无法撤销。`;
            document.getElementById('deleteModal').classList.add('show');
        }

        // 确认删除应用
        function confirmDeleteApp(id, name) {
            pendingDelete = { type: 'app', id, name };
            document.getElementById('deleteText').textContent = `确定要删除应用 "${name}" 吗？此操作无法撤销。`;
            document.getElementById('deleteModal').classList.add('show');
        }

        // 执行删除
        async function performDelete() {
            if (!pendingDelete) return;

            if (pendingDelete.type === 'file') {
                await deleteFile(pendingDelete.id);
            } else {
                deleteApp(pendingDelete.id);
            }

            pendingDelete = null;
            closeModal('deleteModal');
            render();
        }

        // 模态框控制
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showModal(id) {
            document.getElementById(id).classList.add('show');
        }

        // 事件监听
        document.addEventListener('DOMContentLoaded', async () => {
            await initDB();
            loadApps();

            // 侧边栏导航
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentCategory = item.dataset.category;
                    render();
                });
            });

            // 添加按钮
            const addBtn = document.getElementById('addBtn');
            const addDropdown = document.getElementById('addDropdown');

            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                addDropdown.classList.toggle('show');
            });

            document.addEventListener('click', () => {
                addDropdown.classList.remove('show');
            });

            // 上传文件选项
            document.getElementById('uploadFileOption').addEventListener('click', () => {
                addDropdown.classList.remove('show');
                showModal('uploadModal');
            });

            // 添加应用选项
            document.getElementById('addAppOption').addEventListener('click', () => {
                addDropdown.classList.remove('show');
                showModal('appModal');
            });

            // 上传区域
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            let pendingFiles = [];

            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                pendingFiles = Array.from(e.dataTransfer.files);
                if (pendingFiles.length > 0) {
                    uploadArea.innerHTML = `
                        <div class="upload-icon">✅</div>
                        <div class="upload-text">已选择 ${pendingFiles.length} 个文件</div>
                        <div class="upload-hint">点击"确认上传"保存</div>
                    `;
                }
            });

            fileInput.addEventListener('change', () => {
                pendingFiles = Array.from(fileInput.files);
                if (pendingFiles.length > 0) {
                    uploadArea.innerHTML = `
                        <div class="upload-icon">✅</div>
                        <div class="upload-text">已选择 ${pendingFiles.length} 个文件</div>
                        <div class="upload-hint">点击"确认上传"保存</div>
                    `;
                }
            });

            // 确认上传
            document.getElementById('confirmUpload').addEventListener('click', async () => {
                for (const file of pendingFiles) {
                    await saveFile(file);
                }
                pendingFiles = [];
                closeModal('uploadModal');
                uploadArea.innerHTML = `
                    <div class="upload-icon">☁️</div>
                    <div class="upload-text">拖拽文件到此处，或点击选择</div>
                    <div class="upload-hint">支持文档、图片、视频、小工具</div>
                `;
                fileInput.value = '';
                render();
            });

            // 确认添加应用
            document.getElementById('confirmAddApp').addEventListener('click', () => {
                const name = document.getElementById('appName').value.trim();
                const desc = document.getElementById('appDesc').value.trim();
                const icon = document.getElementById('appIcon').value.trim();
                const url = document.getElementById('appUrl').value.trim();

                if (!name || !url) {
                    alert('请填写应用名称和启动链接');
                    return;
                }

                addApp(name, desc, icon, url);
                closeModal('appModal');

                // 清空表单
                document.getElementById('appName').value = '';
                document.getElementById('appDesc').value = '';
                document.getElementById('appIcon').value = '';
                document.getElementById('appUrl').value = '';

                render();
            });

            // 确认删除
            document.getElementById('confirmDelete').addEventListener('click', performDelete);

            // 搜索
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value;
                render();
            });

            // 初始渲染
            render();
        });
    </script>
</body>
</html>
